<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Order Received</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 5px 5px 0 0;
      }
      .content {
        background-color: #f9f9f9;
        padding: 20px;
        border: 1px solid #ddd;
        border-top: none;
        border-radius: 0 0 5px 5px;
      }
      .order-field {
        margin-bottom: 15px;
      }
      .order-field strong {
        display: inline-block;
        min-width: 140px;
        color: #555;
      }
      .items-container {
        background: #fff;
        padding: 10px;
        border: 1px solid #eee;
        border-radius: 4px;
        margin-top: 5px;
        font-family: monospace;
        font-size: 14px;
        white-space: pre-wrap;
      }
      .footer {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #ddd;
        font-size: 12px;
        color: #777;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>New Order Received</h2>
    </div>
    <div class="content">
      <div class="order-field"><strong>Order ID:</strong> {{orderId}}</div>
      <div class="order-field"><strong>Manager ID:</strong> {{managerId}}</div>
      <div class="order-field"><strong>Name:</strong> {{name}}</div>
      <div class="order-field"><strong>Email:</strong> {{email}}</div>
      <div class="order-field"><strong>Status:</strong> {{status}}</div>
      <div class="order-field"><strong>Total Amount:</strong> ${{totalAmount}}</div>
      
      <div class="order-field">
        <strong>Items:</strong>
        <div class="items-container">{{items}}</div>
      </div>

      <div class="order-field">
        <strong>Images:</strong>
        <p>{{images}}</p>
      </div>

      {{googleDriveLink}}
      
      {{notes}}
    </div>
    <div class="footer">
      <p>This is an automated email from your order system.</p>
    </div>
  </body>
</html>
