<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Order Received</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .header {
        background-color: #4caf50;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 5px 5px 0 0;
      }
      .content {
        background-color: #f9f9f9;
        padding: 20px;
        border: 1px solid #ddd;
        border-top: none;
        border-radius: 0 0 5px 5px;
      }
      .order-field {
        margin-bottom: 15px;
      }
      .order-field strong {
        display: inline-block;
        min-width: 120px;
        color: #555;
      }
      .footer {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #ddd;
        font-size: 12px;
        color: #777;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>New Order Received</h2>
    </div>
    <div class="content">
      <div class="order-field"><strong>Name:</strong> {{name}}</div>
      <div class="order-field"><strong>Address:</strong> {{address}}</div>
      <div class="order-field">
        <strong>Order Details:</strong> {{orderDetails}}
      </div>
    </div>
    <div class="footer">
      <p>This is an automated email from your order system.</p>
      <p>Please check the attached images for order reference.</p>
    </div>
  </body>
</html>
